<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated glossy background gradients -->
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="50%" stop-color="#050d24"/>
      <stop offset="100%" stop-color="#030b1a"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="60%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Glossy sheen gradient -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#a78bfa;#22d3ee;#38bdf8" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#22d3ee;#38bdf8;#a78bfa" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#38bdf8;#a78bfa;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Glow filter for title -->
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for rounded corners -->
    <clipPath id="roundedRect">
      <rect width="900" height="280" rx="18"/>
    </clipPath>
    <!-- Shimmer for glossy border -->
    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.2;0.8;0.4;0.6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.2;0.6;0.4" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.4;0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND LAYERS === -->
  <g clip-path="url(#roundedRect)">
    <!-- Base dark background -->
    <rect width="900" height="280" fill="url(#bgBase)"/>

    <!-- Animated color orbs (glossy blobs) -->
    <rect width="900" height="280" fill="url(#orb1)">
      <animate attributeName="opacity" values="1;0.6;1;0.8;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect width="900" height="280" fill="url(#orb2)">
      <animate attributeName="opacity" values="0.8;1;0.6;1;0.8" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect width="900" height="280" fill="url(#orb3)">
      <animate attributeName="opacity" values="0.6;1;0.8;0.5;0.6" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- Moving orb 1 — blue -->
    <circle r="180" fill="#0ea5e9" opacity="0">
      <animate attributeName="cx" values="120;200;80;120" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;160;60;80" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.10;0.06;0.08;0.06" dur="9s" repeatCount="indefinite"/>
    </circle>

    <!-- Moving orb 2 — purple -->
    <circle r="200" fill="#7c3aed" opacity="0">
      <animate attributeName="cx" values="750;680;800;750" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;120;200;200" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.12;0.07;0.10;0.08" dur="11s" repeatCount="indefinite"/>
    </circle>

    <!-- Moving orb 3 — cyan -->
    <circle r="140" fill="#06b6d4" opacity="0">
      <animate attributeName="cx" values="450;520;400;450" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;120;80;50" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.07;0.11;0.06;0.09;0.07" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Subtle grid lines -->
    <g opacity="0.04" stroke="#38bdf8" stroke-width="0.5">
      <line x1="0" y1="56" x2="900" y2="56"/>
      <line x1="0" y1="112" x2="900" y2="112"/>
      <line x1="0" y1="168" x2="900" y2="168"/>
      <line x1="0" y1="224" x2="900" y2="224"/>
      <line x1="180" y1="0" x2="180" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <line x1="540" y1="0" x2="540" y2="280"/>
      <line x1="720" y1="0" x2="720" y2="280"/>
    </g>

    <!-- Floating particles -->
    <g filter="url(#particleGlow)">
      <!-- Row of drifting dots -->
      <circle cx="60" cy="60" r="2" fill="#38bdf8" opacity="0.7">
        <animate attributeName="cy" values="60;20;60" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="200" r="1.5" fill="#a78bfa" opacity="0.6">
        <animate attributeName="cy" values="200;160;200" dur="6.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="6.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="40" r="1.5" fill="#22d3ee" opacity="0.5">
        <animate attributeName="cy" values="40;80;40" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="300;320;300" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="500" cy="240" r="2" fill="#38bdf8" opacity="0.5">
        <animate attributeName="cy" values="240;200;240" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="650" cy="50" r="1.5" fill="#a78bfa" opacity="0.6">
        <animate attributeName="cy" values="50;100;50" dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="820" cy="180" r="2" fill="#22d3ee" opacity="0.5">
        <animate attributeName="cy" values="180;130;180" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="780" cy="40" r="1.5" fill="#38bdf8" opacity="0.4">
        <animate attributeName="cy" values="40;80;40" dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="780;760;780" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="260" r="1.5" fill="#a78bfa" opacity="0.5">
        <animate attributeName="cy" values="260;220;260" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="870" cy="110" r="1.5" fill="#22d3ee" opacity="0.4">
        <animate attributeName="cy" values="110;70;110" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="150" r="1.5" fill="#a78bfa" opacity="0.5">
        <animate attributeName="cy" values="150;190;150" dur="7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Glossy top sheen -->
    <rect width="900" height="280" fill="url(#gloss)"/>

    <!-- === TITLE TEXT WITH TYPEWRITER EFFECT === -->
    <!-- Shadow layer -->
    <text x="450" y="128" text-anchor="middle" font-family="'Courier New', Courier, monospace"
          font-size="52" font-weight="900" fill="#000" opacity="0.5" dx="2" dy="3">
      Visual Product Search Engine
    </text>

    <!-- Main animated title -->
    <text x="450" y="128" text-anchor="middle" font-family="'Courier New', Courier, monospace"
          font-size="52" font-weight="900" fill="url(#titleGrad)" filter="url(#titleGlow)">
      Visual Product Search Engine
      <!-- Typewriter: reveal character by character using clip-path trick via textLength animation -->
      <animate attributeName="textLength" values="0;790" dur="2.6s" fill="freeze" calcMode="discrete"
               keyTimes="0;0.04;0.08;0.12;0.16;0.20;0.24;0.28;0.32;0.36;0.40;0.44;0.48;0.52;0.56;0.60;0.64;0.68;0.72;0.76;0.80;0.84;0.88;0.92;1"
               values="0;32;63;94;126;157;188;219;251;282;313;344;376;407;438;469;500;532;563;594;626;657;688;719;790"/>
      <animate attributeName="opacity" values="0;1" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Blinking cursor after title -->
    <rect x="796" y="84" width="4" height="52" fill="#38bdf8" rx="1">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite" begin="2.6s"/>
      <animate attributeName="opacity" values="0;0;0;0;0" dur="1s" fill="freeze" begin="0s"/>
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite" begin="2.6s"/>
    </rect>

    <!-- Animated underline beam -->
    <rect x="100" y="140" width="0" height="3" rx="1.5" fill="url(#titleGrad)" filter="url(#softGlow)">
      <animate attributeName="width" values="0;700" dur="0.8s" begin="2.6s" fill="freeze" calcMode="spline"
               keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x" values="450;100" dur="0.8s" begin="2.6s" fill="freeze" calcMode="spline"
               keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- Subtitle with fade-in -->
    <text x="450" y="173" text-anchor="middle"
          font-family="'Courier New', Courier, monospace"
          font-size="13.5" fill="#94a3b8" opacity="0" letter-spacing="2">
      Google Lens — but for your own product catalog
      <animate attributeName="opacity" values="0;0;0.85" dur="3.5s" fill="freeze"/>
    </text>

    <!-- Tag pills row -->
    <g opacity="0" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="bold">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" fill="freeze"/>

      <!-- CLIP pill -->
      <rect x="213" y="193" width="74" height="22" rx="11" fill="#0ea5e9" fill-opacity="0.18" stroke="#0ea5e9" stroke-width="0.8"/>
      <text x="250" y="208" text-anchor="middle" fill="#38bdf8">⚡ CLIP</text>

      <!-- Qdrant pill -->
      <rect x="297" y="193" width="80" height="22" rx="11" fill="#ef4444" fill-opacity="0.18" stroke="#ef4444" stroke-width="0.8"/>
      <text x="337" y="208" text-anchor="middle" fill="#f87171">🗄 Qdrant</text>

      <!-- FastAPI pill -->
      <rect x="387" y="193" width="84" height="22" rx="11" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="0.8"/>
      <text x="429" y="208" text-anchor="middle" fill="#34d399">⚙ FastAPI</text>

      <!-- Docker pill -->
      <rect x="481" y="193" width="80" height="22" rx="11" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="0.8"/>
      <text x="521" y="208" text-anchor="middle" fill="#60a5fa">🐳 Docker</text>

      <!-- 512-dim pill -->
      <rect x="571" y="193" width="96" height="22" rx="11" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-width="0.8"/>
      <text x="619" y="208" text-anchor="middle" fill="#a78bfa">📐 512-dim</text>
    </g>

    <!-- Speed stat badges row with fade-in -->
    <g opacity="0" font-family="'Courier New', Courier, monospace">
      <animate attributeName="opacity" values="0;0;0;0;1" dur="5s" fill="freeze"/>
      <text x="265" y="248" text-anchor="middle" fill="#22d3ee" font-size="18" font-weight="bold" filter="url(#softGlow)">&lt;20ms</text>
      <text x="265" y="263" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">SEARCH LATENCY</text>

      <text x="450" y="248" text-anchor="middle" fill="#a78bfa" font-size="18" font-weight="bold" filter="url(#softGlow)">512-D</text>
      <text x="450" y="263" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">VECTOR SPACE</text>

      <text x="635" y="248" text-anchor="middle" fill="#34d399" font-size="18" font-weight="bold" filter="url(#softGlow)">500+</text>
      <text x="635" y="263" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">PRODUCT VECTORS</text>

      <!-- Separator dots -->
      <circle cx="357" cy="253" r="2" fill="#334155"/>
      <circle cx="543" cy="253" r="2" fill="#334155"/>
    </g>
  </g>

  <!-- Glossy animated border (outside clip so it's crisp) -->
  <rect x="1" y="1" width="898" height="278" rx="17" fill="none"
        stroke="url(#borderShimmer)" stroke-width="1.5"/>
  <!-- Inner highlight line top -->
  <line x1="20" y1="2" x2="880" y2="2" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06" stroke-linecap="round"/>
</svg>
